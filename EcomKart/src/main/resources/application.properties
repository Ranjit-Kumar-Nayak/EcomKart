spring.application.name=EcomKart
server.port=5252

# Database Configuration (Example for MySQL)
# Uncomment and modify if you're connecting to a database
spring.datasource.url=jdbc:mysql://localhost:3306/ecomkart
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (Optional, only if you're using Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
